<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .result-card {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
        }
        .positive { background-color: #d4edda; border: 2px solid #28a745; }
        .negative { background-color: #f8d7da; border: 2px solid #dc3545; }
        .neutral { background-color: #fff3cd; border: 2px solid #ffc107; }
        .emoji { font-size: 64px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4>🎯 Sentiment Analysis Tool</h4>
                    </div>
                    <div class="card-body">
                        <form id="sentimentForm">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="textInput" class="form-label">Enter your text:</label>
                                <textarea class="form-control" id="textInput" rows="5" placeholder="Type your text here..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100" id="analyzeBtn">
                                🔍 Analyze Sentiment
                            </button>
                        </form>
                        
                        <div id="result" class="result-card">
                            <div class="text-center">
                                <div class="emoji" id="emojiDisplay">😐</div>
                                <h3 id="sentimentLabel">Neutral</h3>
                                <p><strong>Polarity:</strong> <span id="polarityValue">0.00</span></p>
                                <p><strong>Subjectivity:</strong> <span id="subjectivityValue">0.00</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('sentimentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const text = document.getElementById('textInput').value;
            if (!text.trim()) {
                alert('Please enter some text!');
                return;
            }
            
            const btn = document.getElementById('analyzeBtn');
            btn.innerHTML = '⏳ Analyzing...';
            btn.disabled = true;
            
            fetch('/analyze/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: 'text=' + encodeURIComponent(text)
            })
            .then(response => response.json())
            .then(data => {
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                resultDiv.className = 'result-card ' + data.sentiment;
                
                document.getElementById('emojiDisplay').textContent = data.emoji;
                document.getElementById('sentimentLabel').textContent = data.sentiment.charAt(0).toUpperCase() + data.sentiment.slice(1);
                document.getElementById('polarityValue').textContent = data.polarity.toFixed(2);
                document.getElementById('subjectivityValue').textContent = data.subjectivity.toFixed(2);
                
                btn.innerHTML = '🔍 Analyze Sentiment';
                btn.disabled = false;
            })
            .catch(error => {
                alert('Error: ' + error);
                btn.innerHTML = '🔍 Analyze Sentiment';
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
